# ============================================================
# Logstash Pipeline : ml-alerts → Elasticsearch + TheHive
# Fichier : /etc/logstash/conf.d/ml-alerts-pipeline.conf
# ============================================================

input {
  kafka {
    bootstrap_servers => "192.168.94.132:9092"
    topics            => ["ml-alerts"]
    group_id          => "logstash-ml-consumer"
    codec             => "json"
    auto_offset_reset => "earliest"
    consumer_threads  => 2
  }
}

filter {
  # ── Parse le timestamp ISO8601 ──────────────────────────────
  date {
    match   => ["timestamp", "ISO8601"]
    target  => "@timestamp"
    remove_field => ["timestamp"]
  }

  # ── Enrichissement : Niveau de sévérité en entier ──────────
  if [alert_level] == "CRITICAL" {
    mutate { add_field => { "severity_int" => 4 } }
  } else if [alert_level] == "HIGH" {
    mutate { add_field => { "severity_int" => 3 } }
  } else if [alert_level] == "MEDIUM" {
    mutate { add_field => { "severity_int" => 2 } }
  } else {
    mutate { add_field => { "severity_int" => 1 } }
  }

  # ── Enrichissement : Tag MITRE ATT&CK complet ──────────────
  mutate {
    add_field => {
      "mitre_url" => "https://attack.mitre.org/techniques/%{mitre_technique}"
    }
  }

  # ── Enrichissement : Index par jour ────────────────────────
  mutate {
    add_field => { "[@metadata][index_suffix]" => "%{+YYYY.MM.dd}" }
  }

  # ── Nettoyage des champs internes Logstash ─────────────────
  mutate {
    remove_field => ["@version", "event"]
  }
}

output {
  # ── 1. Elasticsearch ───────────────────────────────────────
  elasticsearch {
    hosts       => ["http://localhost:9200"]
    index       => "ml-detections-%{[@metadata][index_suffix]}"
    action      => "index"
    # user      => "elastic"
    # password  => "changeme"
  }

  # ── 2. TheHive (si score critique >= 0.85) ─────────────────
  if [ml_score] >= 0.85 {
    http {
      url     => "http://localhost:9000/api/v1/alert"
      verb    => "POST"
      format  => "json"
      headers => {
        "Authorization" => "Bearer THEHIVE_API_KEY"
        "Content-Type"  => "application/json"
      }
      mapping => {
        "title"       => "ML Alert : %{alert_level} — %{host} (score=%{ml_score})"
        "description" => "MITRE %{mitre_tactic} (%{mitre_technique}) détecté sur %{host}. Score ML : %{ml_score}. Events dans la fenêtre : %{window_event_count}."
        "severity"    => "%{severity_int}"
        "source"      => "SOC-ML-Pipeline"
        "sourceRef"   => "%{host}-%{@timestamp}"
        "type"        => "ml-detection"
        "tags"        => ["ML", "%{mitre_tactic}", "%{dominant_model}", "PFE-UIR"]
      }
    }
  }

  # ── 3. Log stdout pour debug ───────────────────────────────
  # stdout { codec => rubydebug }
}
